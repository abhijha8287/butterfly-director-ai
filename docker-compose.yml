services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-butterfly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-butterfly}
      POSTGRES_DB: ${POSTGRES_DB:-butterfly_director}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-butterfly}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-butterfly}:${POSTGRES_PASSWORD:-butterfly}@postgres:5432/${POSTGRES_DB:-butterfly_director}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-butterfly}:${POSTGRES_PASSWORD:-butterfly}@postgres:5432/${POSTGRES_DB:-butterfly_director}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-butterfly}:${POSTGRES_PASSWORD:-butterfly}@postgres:5432/${POSTGRES_DB:-butterfly_director}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-butterfly}:${POSTGRES_PASSWORD:-butterfly}@postgres:5432/${POSTGRES_DB:-butterfly_director}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.workers.celery_app worker -Q story,timeline,storyboard,video,voice,music,editing,maintenance --loglevel=info
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  beat:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-butterfly}:${POSTGRES_PASSWORD:-butterfly}@postgres:5432/${POSTGRES_DB:-butterfly_director}
      DATABASE_URL_SYNC: postgresql+psycopg://${POSTGRES_USER:-butterfly}:${POSTGRES_PASSWORD:-butterfly}@postgres:5432/${POSTGRES_DB:-butterfly_director}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.workers.celery_app beat --loglevel=info
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      disable: true

volumes:
  postgres_data:
